{% extends "base.html" %}

{% block title %}{{ section.title }} | {{ config.title }}{% endblock title %}

{% block content %}
<section class="section-page about-page">
  <div class="about-layout">
    <div class="about-photo">
      <img src="/images/about/headshot.jpg" alt="{{ config.extra.author }}" loading="lazy">
    </div>
    <div class="about-content">
      <h1>{{ section.title }}</h1>
      {{ section.content | safe }}
    </div>
  </div>
</section>
{% endblock content %}
